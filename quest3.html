<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сцена</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="scene2">

<!-- ЛЕВЫЙ ПЕРСОНАЖ -->
<div class="person left-person">
    <img src="assets/ruric_quest1.png" class="char-img">

    <div class="speech left-text">
       Нашей крепости просто необходим хороший причал! <br>
       Ты, хлопец, смышленый!<br>
        Помоги нам, и я познакомлю тебя с нашим старшим!
    </div>
</div>

<!-- ПРАВЫЙ ПЕРСОНАЖ -->
<div class="person right-person">
    <img src="assets/vova_862.png" class="char-img">

</div>

<!-- КНОПКА -->
<button class="choice-btn" onclick="openDecisionGame()">
    Забить опоры
</button>
<!-- МИНИ-ИГРА ЦИКЛ -->
<div id="cycleGame" class="dg-overlay" style="display:none;">
    <div class="dg-window">

        <div class="dg-close" onclick="closeGame()">✖</div>

       <h2>Помоги построить причал</h2>
    <h3>Построй 5 опор, повторяя последовательность действий</h3>
<!-- ВИЗУАЛ БРЕВЕН -->
<div id="logs"></div>

<!-- КНОПКИ ДЕЙСТВИЙ -->
<div class="actions">
    <button onclick="doStep(1)">Взять бревно</button>
    <button onclick="doStep(2)">Установить</button>
    <button onclick="doStep(3)">Забить в грунт</button>
</div>

<button id="checkBtn" onclick="checkCycle()">
    Проверить
</button>

    </div>

<!-- POPUP -->
<div id="resultPopup" class="dg-overlay" style="display:none;">
    <div class="dg-window" id="resultContent"></div>
</div>

<audio id="successSound" src="assets/medal.mp3"></audio>
<script>

// =====================
// ПЕРЕМЕННЫЕ
// =====================
let count = 0;      // сколько бревен
let attempts = 0;   // ошибки
let step = 0;       // текущий шаг (1-2-3)

// =====================
// ЗВУКИ
// =====================
const takeSound = new Audio("assets/take.mp3");
const placeSound = new Audio("assets/place.mp3");
const hitSound = new Audio("assets/hit.mp3");
const successSound = document.getElementById("successSound");

// =====================
// ОТКРЫТЬ / ЗАКРЫТЬ
// =====================
function openDecisionGame() {
    document.getElementById("cycleGame").style.display = "flex";
}

function closeGame() {
    document.getElementById("cycleGame").style.display = "none";
}

// =====================
// ДЕЙСТВИЯ
// =====================
function doStep(action) {

    // ✅ правильный шаг
    if (action === step + 1) {

        step++;

        playSound(action);

        // завершили цикл → добавляем бревно
        if (step === 3) {
            addLog();
            step = 0;
        }

    } else {

        // ❌ ошибка последовательности
        attempts++;
        step = 0;

        showSequenceError();
    }
}

// =====================
// ЗВУК
// =====================
function playSound(action) {
    if (action === 1) takeSound.play();
    if (action === 2) placeSound.play();
    if (action === 3) hitSound.play();
}

// =====================
// ДОБАВИТЬ БРЕВНО
// =====================
function addLog() {

    count++;

    const log = document.createElement("div");
    log.className = "log";

    document.getElementById("logs").appendChild(log);

    setTimeout(() => {
        log.classList.add("show");
    }, 50);
}

// =====================
// ПРОВЕРКА
// =====================
function checkCycle() {

    // ✅ РОВНО 5
    if (count === 5) {
        showSuccess();
        return;
    }

    attempts++;

    // ❌ меньше 5
    if (count < 5) {
        showLessError();
    }

    // ❌ больше 5
    if (count > 5) {
        showOverError();
    }
}

// =====================
// ОШИБКА ПОСЛЕДОВАТЕЛЬНОСТИ
// =====================
function showSequenceError() {

    // 3 ошибки → конец
    if (attempts >= 3) {
        showGameOver();
        return;
    }

    document.getElementById("resultContent").innerHTML = `
        <h2>Ошибка</h2>

        <div class="hint-box">
            <img src="assets/vova-862.png" class="hint-img">
            <p>Неправильно! Последовательность нарушена</p>
        </div>

        <button onclick="retry()">Продолжить</button>
    `;

    document.getElementById("resultPopup").style.display = "flex";
}

// =====================
// МЕНЬШЕ 5
// =====================
function showLessError() {

    if (attempts >= 3) {
        showGameOver();
        return;
    }

    document.getElementById("resultContent").innerHTML = `
        <h2>Ошибка</h2>

        <div class="hint-box">
            <img src="assets/vova-862.png" class="hint-img">
            <p>Неверно! Количество последовательностей должно быть 5</p>
        </div>

        <button onclick="retry()">Продолжить</button>
    `;

    document.getElementById("resultPopup").style.display = "flex";
}

// =====================
// БОЛЬШЕ 5
// =====================
function showOverError() {

    if (attempts >= 3) {
        showGameOver();
        return;
    }

    document.getElementById("resultContent").innerHTML = `
        <h2>Ошибка</h2>

        <div class="hint-box">
            <img src="assets/vova-862.png" class="hint-img">
            <p>Неверно! Вы сделали больше заявленного количества!</p>
        </div>

        <button onclick="retry(true)">Попробовать снова</button>
    `;

    document.getElementById("resultPopup").style.display = "flex";
}

// =====================
// УСТАЛ (3 ОШИБКИ)
// =====================
function showGameOver() {

    document.getElementById("resultContent").innerHTML = `
        <h2>Ошибка</h2>

        <div class="hint-box">
            <img src="assets/vova-862.png" class="hint-img">
            <p>Вы устали... Попробуй позже</p>
        </div>

        <button onclick="resetGame()">Выйти</button>
    `;

    document.getElementById("resultPopup").style.display = "flex";
}

// =====================
// УСПЕХ
// =====================
function showSuccess() {

    document.getElementById("resultContent").innerHTML = `
        <h2>Верно!</h2>

        <div class="hint-box">
            <p>— А ты способный! Пойдём поможешь нам в другом деле!</p>
        </div>

        <button onclick="showTheory()">Далее</button>
    `;

    document.getElementById("resultPopup").style.display = "flex";
}

// =====================
// ОБУЧЕНИЕ
// =====================
function showTheory() {

    document.getElementById("resultContent").innerHTML = `
        <h2>Обучение</h2>

        <p>Цикл — повторение действий, пока выполняется условие.</p>

        <button onclick="showReward()">Ок</button>
    `;
}

// =====================
// НАГРАДА
// =====================
function showReward() {

    let img = "";

    if (attempts === 0) img = "assets/medal-gold.png";
    else if (attempts === 1) img = "assets/medal-silvers.png";
    else img = "assets/medal-bronse.png";

    document.getElementById("resultContent").innerHTML = `
        <h2>Награда!</h2>

        <img src="${img}" class="result-img">

        <p>Получена новая награда: Повторение</p>

        <button onclick="goNext()">Далее</button>
    `;

    successSound.currentTime = 0;
    successSound.play();
}

// =====================
// RETRY
// =====================
function retry(reset = false) {

    document.getElementById("resultPopup").style.display = "none";

    if (reset) {
        resetGame();
    }
}

// =====================
// СБРОС
// =====================
function resetGame() {
    count = 0;
    step = 0;

    document.getElementById("logs").innerHTML = "";
}

// =====================
// ПЕРЕХОД
// =====================
function goNext() {

    document.body.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "quest4.html";
    }, 600);
}

// =====================
// ЗАКРЫТЬ
// =====================
function closeResult() {
    document.getElementById("resultPopup").style.display = "none";
    document.getElementById("cycleGame").style.display = "none";
}

</script>
</body>
</html>
