<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Код Рюрика</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ЗАГРУЗКА -->
<div class="container" id="loader">
    <div class="logo-box">Лого команды</div>
    <h1>КОД РЮРИКА</h1>

    <div style="position:absolute; bottom:120px; width:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="boat">
            <img src="assets/image.png">
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
    </div>
</div>

<!-- ТЕМНЫЙ ЭКРАН -->
<div class="dark-screen" id="dark">
    <div class="title">
        <span class="city">Великий Новгород</span>
        <span class="year">2121</span>
    </div>
</div>

<!-- МЕНЮ -->
<div class="menu-screen" id="menu">

    <div class="menu-left">

        <div class="menu-text">
            <p>Привет! Меня зовут Вова,<br>я учусь в Школе21</p>

            <p>Сегодня я засиделся до поздна,<br>
            чтобы закончить трудный проект</p>

            <p>Пожалуй, пойду поищу кофейный<br>
            аппарат или станцию<br>
            с питательными гелями...</p>
        </div>

        <div class="menu-buttons">
            <button class="menu-btn" id="newGame">Новая игра</button>
            <button class="menu-btn">Выход</button>
        </div>

    </div>

    <img src="assets/vova-2121.png" class="character">

    <audio id="clickSound" src="assets/click.mp3"></audio>
</div>

<div class="game-screen" id="game">

    <!-- ДВЕРЬ СЛЕВА -->
    <div class="door-block left">
        <div class="door-title">Склад</div>
        <img src="assets/door.png" class="door" id="door">
    </div>

    <!-- ПЕРСОНАЖ ПО ЦЕНТРУ -->
    <img src="assets/vova-2121.png" class="character-game center">

    <!-- ТЕКСТ НАД ПЕРСОНАЖЕМ -->
    <div class="dialogue-text top-center">
        Хм!... Не замечал раньше этой двери...
    </div>

    <!-- ПОДСКАЗКА -->
    <div class="hint" id="hint">
        <img src="assets/hand.png">
        <span>Нажмите, чтоб открыть</span>
    </div>

    <audio id="doorSound" src="assets/door.mp3"></audio>

</div>

<script>
let progress = 0;

const bar = document.getElementById('progress');
const loader = document.getElementById('loader');
const dark = document.getElementById('dark');
const menu = document.getElementById('menu');
const game = document.getElementById('game');

const clickSound = document.getElementById('clickSound');
const doorSound = document.getElementById('doorSound');

const newGameBtn = document.getElementById('newGame');
const door = document.getElementById('door');
const hint = document.getElementById('hint');

// ===== ЗАГРУЗКА =====
const interval = setInterval(() => {
    progress += Math.random() * 10;

    if (progress >= 100) {
        progress = 100;
        clearInterval(interval);

        setTimeout(() => {
            loader.style.display = 'none';
            dark.style.display = 'flex';

            setTimeout(() => {
                dark.style.opacity = '1';
            }, 50);

        }, 300);
    }

    bar.style.width = progress + '%';
}, 200);

// ===== КЛИК ПО ТЕМНОМУ ЭКРАНУ =====
dark.addEventListener('click', () => {
    dark.style.display = 'none';
    menu.style.display = 'block';
});

// ===== КНОПКА НОВАЯ ИГРА =====
newGameBtn.addEventListener('click', () => {
    clickSound.currentTime = 0;
    clickSound.play();

    setTimeout(() => {
        menu.style.display = 'none';
        game.style.display = 'block';

        // подсказка через 30 сек
        setTimeout(() => {
            hint.style.display = 'flex';
        }, 30000);

    }, 200);
});

// ===== ДВЕРЬ =====
// клик по двери
door.addEventListener('click', () => {
    doorSound.currentTime = 0;
    doorSound.play();

    setTimeout(() => {
        window.location.href = "scene2.html";
    }, 500);
});

door.addEventListener('mouseenter', () => {
    hint.style.display = 'none';
});
</script>

</body>
</html>
