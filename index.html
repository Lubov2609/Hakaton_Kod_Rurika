<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Код Рюрика</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

  <!-- ФОН -->
  <div class="background"></div>

  <!-- ГЕРОЙ -->
  <div class="hero">
    <img src="assets/hero.png" alt="hero">
  </div>

  <!-- МЕНЮ -->
  <div class="menu">
    <h2>Код Рюрика</h2>

    <button onclick="startGame()">Новая игра</button>
    <button onclick="alert('В разработке')">Выбор героя</button>
    <button disabled>Статистика</button>
    <button onclick="exitGame()">Выход</button>
  </div>

</div>

<canvas id="gameCanvas"></canvas>

<div id="doorUI" style="display:none;">
  <button onclick="enterStorage()">Открыть дверь</button>
</div>
<script src="script.js"></script>
</body>
</html>
